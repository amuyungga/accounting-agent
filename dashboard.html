<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spectrum Financial Solutions — Command Center</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f5f9; color: #1e293b; min-height: 100vh; }

    /* ── Header ── */
    header {
      background: #1a3c6e;
      color: #fff;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    header h1 { font-size: 18px; font-weight: 700; }
    header p  { font-size: 12px; opacity: 0.7; margin-top: 2px; }
    #last-updated { font-size: 12px; opacity: 0.65; }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      background: #1a3c6e;
      padding: 0 32px;
      border-bottom: none;
    }
    .tab-btn {
      padding: 12px 20px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all .15s;
    }
    .tab-btn:hover { color: rgba(255,255,255,0.9); }
    .tab-btn.active { color: #fff; border-bottom-color: #60a5fa; }

    /* ── Overview stats row ── */
    .overview-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      padding: 24px 32px 8px;
    }
    .stat-card {
      background: #fff;
      border-radius: 12px;
      padding: 18px 22px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .stat-card .label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: .06em; }
    .stat-card .value { font-size: 2rem; font-weight: 700; color: #1a3c6e; margin-top: 4px; }
    .stat-card .sub   { font-size: 11px; color: #94a3b8; margin-top: 2px; }

    /* ── Section ── */
    .section { display: none; }
    .section.active { display: block; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 32px 8px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid #e2e8f0;
      background: #fff;
      font-size: 12px;
      cursor: pointer;
      color: #475569;
      transition: all .15s;
    }
    .filter-btn.active { background: #1a3c6e; color: #fff; border-color: #1a3c6e; }
    .search-input {
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 13px;
      outline: none;
      width: 200px;
      background: #fff;
    }
    .search-input:focus { border-color: #1a3c6e; }
    .ml-auto { margin-left: auto; }
    .refresh-btn {
      padding: 7px 14px;
      background: #1a3c6e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
    }
    .refresh-btn:hover { background: #15315e; }
    .export-btn {
      padding: 7px 14px;
      background: rgba(26,60,110,0.08);
      color: #1a3c6e;
      border: 1px solid #1a3c6e;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      text-decoration: none;
    }

    /* ── Table ── */
    .table-wrap { padding: 8px 32px 32px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); font-size: 13px; }
    thead { background: #f8fafc; }
    th { padding: 11px 14px; text-align: left; font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid #e2e8f0; }
    td { padding: 12px 14px; border-top: 1px solid #f1f5f9; vertical-align: middle; }
    tr:hover td { background: #f8fafc; }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }
    /* Chat lead badges */
    .badge-tax   { background: #dcfce7; color: #166534; }
    .badge-book  { background: #fef9c3; color: #854d0e; }
    .badge-cfo   { background: #ede9fe; color: #5b21b6; }
    .badge-pay   { background: #fee2e2; color: #991b1b; }
    .badge-other { background: #dbeafe; color: #1d4ed8; }
    /* Outbound badges */
    .badge-emailed    { background: #dcfce7; color: #16a34a; }
    .badge-found      { background: #dbeafe; color: #1d4ed8; }
    .badge-no_email   { background: #fff7ed; color: #c2410c; }
    .badge-no_website { background: #f1f5f9; color: #64748b; }
    .badge-error      { background: #fee2e2; color: #dc2626; }
    /* Call badges */
    .badge-answered   { background: #dcfce7; color: #16a34a; }
    .badge-missed     { background: #fee2e2; color: #dc2626; }
    .badge-live       { background: #dbeafe; color: #2563eb; }

    .biz-name    { font-weight: 600; }
    .biz-sub     { font-size: 11px; color: #94a3b8; margin-top: 2px; }
    .biz-industry { font-size: 10px; color: #7c3aed; background: #ede9fe; border-radius: 4px; padding: 1px 6px; display: inline-block; margin-top: 3px; }
    .email-preview { max-width: 320px; font-size: 12px; color: #64748b; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; cursor: pointer; }
    .email-preview.open { -webkit-line-clamp: unset; display: block; }

    .empty { text-align: center; padding: 48px; color: #94a3b8; }
    a { color: #1a3c6e; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Call modal ── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 12px; width: 600px; max-width: 95vw; max-height: 80vh; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
    .modal-header { padding: 18px 22px 14px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: flex-start; }
    .modal-header h2 { font-size: 15px; }
    .modal-meta { font-size: 12px; color: #94a3b8; margin-top: 3px; }
    .modal-close { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: #94a3b8; }
    .modal-body { padding: 18px 22px; overflow-y: auto; flex: 1; }
    .modal-section { margin-bottom: 16px; }
    .modal-section h3 { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: #94a3b8; margin-bottom: 6px; }
    .modal-text { font-size: 13px; line-height: 1.6; color: #334155; background: #f8fafc; padding: 12px; border-radius: 8px; white-space: pre-wrap; max-height: 260px; overflow-y: auto; }
    .no-data { color: #94a3b8; font-style: italic; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>📊 Spectrum Financial Solutions — Command Center</h1>
    <p>AI Marketing & Sales Agent</p>
  </div>
  <span id="last-updated">Loading...</span>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('overview', this)">🏠 Overview</button>
  <button class="tab-btn" onclick="switchTab('chat', this)">💬 Chat Leads</button>
  <button class="tab-btn" onclick="switchTab('outbound', this)">📤 Outbound</button>
  <button class="tab-btn" onclick="switchTab('calls', this)">📞 Calls</button>
</div>

<!-- ══════════════════════════════════════════════════════
     OVERVIEW TAB
══════════════════════════════════════════════════════ -->
<div id="tab-overview" class="section active">
  <div class="overview-stats">
    <div class="stat-card
