name: Daily Outbound Agent

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 100

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run outbound agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
          VAPI_API_KEY: ${{ secrets.VAPI_API_KEY }}
          RAILWAY_SYNC_URL: ${{ secrets.RAILWAY_SYNC_URL }}
        run: node outbound-agent.js 2>&1 | tee /tmp/agent-log.txt

      - name: Show agent summary
        if: always()
        run: tail -50 /tmp/agent-log.txt || true
